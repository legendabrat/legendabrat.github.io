<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Arial, sans-serif;
}

.overlay{

position:absolute;
bottom:40px;
left:40px;

background:linear-gradient(90deg,#0b0b0f,#120b0b);

border-radius:10px;
padding:14px 22px;

display:flex;
align-items:center;
gap:30px;

color:white;

box-shadow:0 0 20px rgba(255,80,0,0.15);
}

.block{
display:flex;
flex-direction:column;
}

.big{
font-size:26px;
font-weight:700;
}

.green{
color:#00ff9c;
}

.red{
color:#ff5252;
}

.orange{
color:#ffa726;
}

.label{
font-size:12px;
opacity:0.6;
}

.progressbar{
position:absolute;
bottom:0;
left:0;

height:5px;
width:100%;

background:#1c1c22;
border-radius:0 0 10px 10px;
overflow:hidden;
}

.progress{

height:100%;
width:50%;

background:linear-gradient(90deg,#ffb300,#ff6f00);

}

</style>
</head>

<body>

<div class="overlay">

<div class="block">
<div class="big">
<span id="mmr">3840</span>
<span style="opacity:0.5">→</span>
<span id="target">4000</span>
</div>
</div>

<div class="block">
<div class="big green">
<span id="gain">+30</span>
</div>
</div>

<div class="block">
<div class="big orange">
<span id="wr">84%</span>
</div>
</div>

<div class="block">
<div class="big">
<span class="green" id="wins">4</span>
 /
<span class="red" id="losses">2</span>
</div>
<div class="label">СЕГОДНЯ</div>
</div>

<div class="block">
<div class="big orange">
<span id="streak">3</span>🔥
</div>
<div class="label">СТРИК</div>
</div>

<div class="progressbar">
<div class="progress" id="progress"></div>
</div>

</div>

<script>

const socket = new WebSocket("ws://127.0.0.1:8080");

socket.onmessage = (event)=>{

const data = JSON.parse(event.data);

if(data.mmr)
document.getElementById("mmr").innerText = data.mmr;

if(data.target)
document.getElementById("target").innerText = data.target;

if(data.gain)
document.getElementById("gain").innerText = data.gain;

if(data.wr)
document.getElementById("wr").innerText = data.wr;

if(data.wins)
document.getElementById("wins").innerText = data.wins;

if(data.losses)
document.getElementById("losses").innerText = data.losses;

if(data.streak)
document.getElementById("streak").innerText = data.streak;

if(data.progress)
document.getElementById("progress").style.width = data.progress + "%";

}

</script>

</body>
</html>
