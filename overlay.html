<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Oswald, sans-serif;
}

.bar{
position:absolute;
bottom:40px;
left:40px;

background:rgba(0,0,0,0.8);
border:1px solid rgba(192,57,43,0.5);
border-radius:8px;

padding:10px 18px;
display:flex;
gap:20px;

color:white;
font-size:22px;
}

.w{color:#00e676;}
.l{color:#ef5350;}

</style>
</head>

<body>

<div class="bar">

<div>
MMR
<span id="mmr">3840</span>
</div>

<div>
<span class="w" id="wins">4</span>
 /
<span class="l" id="losses">2</span>
</div>

<div id="streak">
3🔥
</div>

</div>


<script>

const socket = new WebSocket("ws://127.0.0.1:8080");

socket.onmessage = (event)=>{

const data = JSON.parse(event.data);

if(data.mmr)
document.getElementById("mmr").innerText = data.mmr;

if(data.wins)
document.getElementById("wins").innerText = data.wins;

if(data.losses)
document.getElementById("losses").innerText = data.losses;

if(data.streak)
document.getElementById("streak").innerText = data.streak;

}

</script>

</body>
</html>
